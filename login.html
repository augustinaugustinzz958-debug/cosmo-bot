<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login — CosmoBot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <!-- 3D Space Background canvas -->
  <div id="galaxy-container" aria-hidden="true"></div>

  <main class="auth-card" role="main">
    <h1 style="margin:0 0 8px">Welcome back</h1>
    <p style="margin:0 0 20px;color:#bcd3e6">Sign in to continue to CosmoBot</p>
    <form id="loginForm">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required autocomplete="email" />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" required autocomplete="current-password" />
      <div class="actions">
        <button class="btn" type="submit">Login</button>
        <div class="muted">Don't have an account?<a href="register.html" style="color:#6ee7b7;margin-left:8px;text-decoration:none">Register</a></div>
      </div>
    </form>
  </main>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e){
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if(!email || !password){ alert('Please enter email and password'); return; }

      // If Firebase is available, sign in and redirect to dashboard
      if(window.firebase && firebase.auth){
        try{
          await firebase.auth().signInWithEmailAndPassword(email, password);
          window.location.href = 'dashboard.html';
        }catch(err){
          alert(err.message || 'Login failed');
        }
        return;
      }

      // Fallback demo behavior: redirect to dashboard
      const registered = JSON.parse(localStorage.getItem('currentUser') || '{}');
      if (registered.email !== email) {
        localStorage.setItem('currentUser', JSON.stringify({ displayName: email.split('@')[0], email: email }));
      }
      alert('Login successful! Redirecting to dashboard.');
      window.location.href = 'dashboard.html';
    });
  </script>
  <!-- Three.js + Space BG Script -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="login-bg.js"></script>
</body>
</html>
