<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CosmoBot - Your AI Study Companion</title>
    <meta name="description" content="CosmoBot is an AI-powered study assistant in a distraction-free, space-themed environment.">
    <!-- Google Fonts: Outfit for a modern, futuristic look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 3D Solar System Background Canvas -->
    <canvas id="space-canvas"></canvas>

    <!-- Main Content Overlay -->
    <main class="content-container">
        <!-- Introduction Section -->
        <section class="intro-glass-card">
            <h1 class="logo-title">Cosmo<span>Bot</span></h1>
            <p class="tagline">Your AI-Powered Virtual Study Companion</p>
            <p class="description">
                Escape the distractions of your smartphone. CosmoBot brings your planner, reminders, and an intelligent chatbot into one centralized, immersive, space-themed environment. Focus better, study smarter.
            </p>
            
            <!-- Call to Action Buttons -->
            <div class="cta-container">
                <a class="control-panel-btn login-btn" href="login.html">
                    <span class="btn-text">Login</span>
                    <div class="btn-glow"></div>
                </a>
                <a class="control-panel-btn signup-btn" href="register.html">
                    <span class="btn-text">Register</span>
                    <div class="btn-glow"></div>
                </a>
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
