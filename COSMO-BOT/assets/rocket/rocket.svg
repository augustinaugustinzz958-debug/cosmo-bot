<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e0e0e0"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="none"/>
  <!-- rocket body -->
  <g transform="translate(256,280) scale(1,-1)">
    <path d="M0 160 C40 120 80 80 80 0 C80 -80 40 -120 0 -160 C-40 -120 -80 -80 -80 0 C-80 80 -40 120 0 160 Z"
          fill="url(#g)" stroke="#333" stroke-width="6"/>
    <!-- nose cone -->
    <path d="M0 160 L28 200 L-28 200 Z" fill="#ff4d4d" stroke="#b30000" stroke-width="4"/>
    <!-- window -->
    <circle cx="0" cy="40" r="26" fill="#66ccff" stroke="#0d66a3" stroke-width="5"/>
    <!-- fins -->
    <path d="M80 0 L150 -40 L120 20 Z" fill="#ffcc00" stroke="#b38600" stroke-width="4"/>
    <path d="M-80 0 L-150 -40 L-120 20 Z" fill="#ffcc00" stroke="#b38600" stroke-width="4"/>
    <!-- exhaust flame placeholder (transparent region) -->
    <path d="M0 -160 C12 -180 24 -220 0 -260 C-24 -220 -12 -180 0 -160 Z" fill="orange" opacity="0.85"/>
  </g>
</svg>
